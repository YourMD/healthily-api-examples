info:
  name: Add from autocomplete
  type: http
  seq: 7

http:
  method: POST
  url: "{{base_url}}/{{version}}/chat"
  headers:
    - name: x-api-key
      value: "{{x_api_key}}"
  body:
    type: json
    data: |-
      {
          "type": "autocomplete",
          "included": ["skip_autocomplete"],
          "excluded": []
      }
  auth:
    type: bearer
    token: "{{v5_upgraded_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
