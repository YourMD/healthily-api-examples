info:
  name: Add Symptoms
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/{{version}}/chat"
  headers:
    - name: x-api-key
      value: "{{x_api_key}}"
  body:
    type: json
    data: |-
      {
          "type": "generic",
          "included": ["add_symptoms"],
          "excluded": ["continue_assessment"]
      }
  auth:
    type: bearer
    token: "{{v5_upgraded_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
