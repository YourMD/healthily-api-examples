info:
  name: Ratification Answer
  type: http
  seq: 5

http:
  method: POST
  url: "{{base_url}}/{{version}}/chat"
  headers:
    - name: x-api-key
      value: "{{x_api_key}}"
  body:
    type: json
    data: |-
      {
          "type": "generic",
          "included": ["assessment_C0008031", "assessment_C0038990", "assessment_C0241416", "assessment_CM001783"],
          "excluded": []
      }
  auth:
    type: bearer
    token: "{{v5_upgraded_token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.getBody();

        test("1. Triage level display name matches", function () {
          expect(body.report.overall_outcome.subdomain_triage_level.display_name).to.equal("No outcome");
        });

        test("2. Main recommendation matches", function () {
          expect(body.report.overall_outcome.main_recommendation).to.equal("You have not received an assessment at this time");
        });

        test("3. Messages value matches", function () {
          const messages = body.report.overall_outcome.messages;

          expect(messages).to.be.an("array");
          expect(messages.length).to.equal(2);

          expect(messages.map(m => m.value)).to.deep.equal([
            "It has not been possible to make a recommendation on the information you have provided. Your symptoms may not have been fully recognised or they may not clearly point to 1 specific condition. The assessment can only assess 1 problem per session.",
            "If you need emergency medical help, please call 999. Otherwise please contact your doctor, NHS 111, or see “Your other options”."
          ]);
        });

        test("4. Contains instructions array", function () {
          const instructions = body.report.overall_outcome.instructions;

          expect(instructions).to.be.an("array");
          expect(instructions.length).to.be.greaterThan(0);
          expect(instructions[0].value).to.equal("How to use the assessment");
        });

        test("5. Contains other options array", function () {
          const options = body.report.other_options.options;

          expect(options).to.be.an("array");
          expect(options.length).to.be.greaterThan(0);
        });

        test("6. Information articles section is absent", function () {
          expect(body.report.information_articles).to.not.exist;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
