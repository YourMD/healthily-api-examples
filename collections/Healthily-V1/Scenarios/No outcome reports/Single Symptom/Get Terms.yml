info:
  name: Get Terms
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/{{version}}/terms"
  headers:
    - name: x-api-key
      value: "{{x_api_key}}"
  auth:
    type: bearer
    token: "{{v5_token}}"

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("terms_version", res.getBody().content_version);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
