info:
  name: Search
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/{{version}}/symptom-search?text=ear&gender=male"
  headers:
    - name: x-api-key
      value: "{{x_api_key}}"
  params:
    - name: text
      value: ear
      type: query
    - name: gender
      value: male
      type: query
  auth:
    type: bearer
    token: "{{v5_upgraded_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
