http:
  method: GET
  url: "{{base_url}}/{{version}}/chat"
  headers:
    - name: x-api-key
      value: "{{x_api_key}}"
  auth:
    type: bearer
    token: "{{v5_upgraded_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
